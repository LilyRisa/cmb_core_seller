# Main nginx config cho PROD `web` image (thay default của nginx:alpine) —
# nâng worker_connections + fd cho tải cao. Dev KHÔNG dùng file này (dev chạy
# nginx:alpine mặc định + bind mount). Log vẫn ra stdout/stderr (image symlink sẵn).
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;           # cần ulimits nofile ở compose
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    server_tokens off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml text/javascript image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}

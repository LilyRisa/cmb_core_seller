; App-level PHP overrides for the container (see docker/Dockerfile).
memory_limit = 512M
upload_max_filesize = 32M
post_max_size = 40M
max_execution_time = 120
expose_php = Off

; OPcache — production defaults; harmless in dev (the app code is baked into the image).
; Prod (APP_ENV != local) còn tắt validate_timestamps qua entrypoint (zz-prod-opcache.ini).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 24
opcache.max_accelerated_files = 30000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
realpath_cache_size = 4096k
realpath_cache_ttl = 600

# Local dev overrides. Auto-load khi chạy `docker compose up`.
# Bật bind mount, publish port host, vite HMR, mailpit, RUN_MIGRATIONS=true.

services:
  app:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      RUN_MIGRATIONS: "true"
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
    volumes:
      - ./app:/var/www/html
      - /var/www/html/vendor

  web:                              # dev: nginx alpine + bind mount, không build image
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./app/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/public:/var/www/html/public:ro

  worker:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
    volumes:
      - ./app:/var/www/html
      - /var/www/html/vendor

  scheduler:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    volumes:
      - ./app:/var/www/html
      - /var/www/html/vendor

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  vite:                             # frontend dev server (HMR)
    image: node:20-alpine
    container_name: cmb-vite
    working_dir: /app
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0"]
    volumes:
      - ./app:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  mailpit:                          # catch outgoing mail
    image: axllent/mailpit:latest
    container_name: cmb-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
# Local development stack for OmniSell / CMBcoreSeller.
#
#   cp app/.env.example app/.env
#   docker compose up -d --build
#   docker compose exec app php artisan migrate --seed   # (also runs on boot via RUN_MIGRATIONS)
#
#   http://localhost:8000          the app (React SPA, served via Vite HMR in dev)
#   http://localhost:8000/horizon  queue dashboard
#   http://localhost:8025          Mailpit — caught outgoing email
#   http://localhost:9001          MinIO console (user: omnisell / pass: omnisell-secret)
#
# Code in ./app is bind-mounted, so edits are live. PHP deps come from the image
# (anonymous `vendor` volume); after changing composer.lock run
# `docker compose run --rm app composer install`. See docs/07-infra/environments-and-docker.md.

x-app-env: &app-env
  APP_ENV: local
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: cmbcoreseller
  DB_USERNAME: cmbcoreseller
  DB_PASSWORD: secret
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "null"
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  MAIL_MAILER: smtp
  MAIL_HOST: mailpit
  MAIL_PORT: "1025"
  FILESYSTEM_DISK: s3
  AWS_ACCESS_KEY_ID: omnisell
  AWS_SECRET_ACCESS_KEY: omnisell-secret
  AWS_DEFAULT_REGION: ap-southeast-1
  AWS_BUCKET: omnisell
  AWS_ENDPOINT: http://minio:9000
  AWS_USE_PATH_STYLE_ENDPOINT: "true"
  GOTENBERG_URL: http://gotenberg:3000
  LOG_CHANNEL: stack
  LOG_STACK: json

x-app-base: &app-base
  build:
    context: ./app
    dockerfile: docker/Dockerfile
  image: cmbcoreseller-app:local
  volumes:
    - ./app:/var/www/html
    - /var/www/html/vendor          # anonymous: keep the image's vendored deps
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  app:                              # php-fpm
    <<: *app-base
    container_name: cmb-app
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "true"        # only this container migrates / warms caches on boot
    expose:
      - "9000"

  web:                              # nginx -> app:9000
    image: nginx:1.27-alpine
    container_name: cmb-web
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./app/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/public:/var/www/html/public:ro

  worker:                           # Laravel Horizon (queues)
    <<: *app-base
    container_name: cmb-worker
    command: ["php", "artisan", "horizon"]
    environment: *app-env
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  scheduler:                        # cron (schedule:work)
    <<: *app-base
    container_name: cmb-scheduler
    command: ["php", "artisan", "schedule:work"]
    environment: *app-env

  vite:                             # frontend dev server (HMR) — writes public/hot
    image: node:20-alpine
    container_name: cmb-vite
    working_dir: /app
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0"]
    volumes:
      - ./app:/app
      - /app/node_modules           # anonymous
    ports:
      - "5173:5173"

  postgres:
    image: postgres:15-alpine
    container_name: cmb-postgres
    environment:
      POSTGRES_DB: cmbcoreseller
      POSTGRES_USER: cmbcoreseller
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmbcoreseller -d cmbcoreseller"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cmb-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:                            # S3-compatible object storage (label PDFs, exports, images)
    image: minio/minio:latest
    container_name: cmb-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: omnisell
      MINIO_ROOT_PASSWORD: omnisell-secret
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:                       # one-shot: ensure the `omnisell` bucket exists, then exit
    image: minio/mc:latest
    container_name: cmb-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 omnisell omnisell-secret &&
      mc mb --ignore-existing local/omnisell &&
      mc anonymous set download local/omnisell/public || true
      "
    restart: "no"

  gotenberg:                        # HTML -> PDF for picking / packing / label printing
    image: gotenberg/gotenberg:8
    container_name: cmb-gotenberg
    command: ["gotenberg", "--api-timeout=60s"]

  mailpit:                          # catches outgoing email in dev
    image: axllent/mailpit:latest
    container_name: cmb-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  redisdata:
  miniodata:

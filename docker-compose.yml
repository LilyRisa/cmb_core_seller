# Base stack for OmniSell / CMBcoreSeller.
#
# Local dev:  docker compose up -d --build           (docker-compose.override.yml tự load)
# Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Base này KHÔNG publish port DB/Redis/MinIO, KHÔNG bind-mount source, KHÔNG có vite/mailpit.
# Mọi tiện ích dev nằm ở override; mọi đặc thù prod nằm ở prod.yml.

x-app-env: &app-env
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: cmbcoreseller
  DB_USERNAME: cmbcoreseller
  DB_PASSWORD: 1995oklangtu
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "null"
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  FILESYSTEM_DISK: s3
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-omnisell}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-omnisell-secret}
  AWS_DEFAULT_REGION: ap-southeast-1
  AWS_BUCKET: ${AWS_BUCKET:-omnisell}
  AWS_ENDPOINT: http://minio:9000
  AWS_USE_PATH_STYLE_ENDPOINT: "true"
  GOTENBERG_URL: http://gotenberg:3000
  LOG_CHANNEL: stack
  LOG_STACK: json

x-app-base: &app-base
  build:
    context: ./app
    dockerfile: docker/Dockerfile
  image: cmbcoreseller-app:${APP_TAG:-local}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  app:                              # php-fpm
    <<: *app-base
    container_name: cmb-app
    environment: *app-env
    expose:
      - "9000"

  web:                              # nginx -> app:9000
    # Mặc định = nginx thuần (dev override bind-mount conf + public/). Prod thay bằng
    # build từ app/docker/nginx/Dockerfile (nginx + public/ copy từ image app).
    image: nginx:1.27-alpine
    container_name: cmb-web
    depends_on:
      - app

  worker:                           # Laravel Horizon
    <<: *app-base
    container_name: cmb-worker
    command: ["php", "artisan", "horizon"]
    environment: *app-env
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  scheduler:                        # 1 instance duy nhất
    <<: *app-base
    container_name: cmb-scheduler
    command: ["php", "artisan", "schedule:work"]
    environment: *app-env

  postgres:
    image: postgres:15-alpine
    container_name: cmb-postgres
    environment:
      POSTGRES_DB: cmbcoreseller
      POSTGRES_USER: cmbcoreseller
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmbcoreseller -d cmbcoreseller"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cmb-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:                            # S3-compatible
    image: minio/minio:latest
    container_name: cmb-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-omnisell}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-omnisell-secret}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:                       # one-shot: tạo bucket
    image: minio/mc:latest
    container_name: cmb-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-omnisell} ${AWS_SECRET_ACCESS_KEY:-omnisell-secret} &&
      mc mb --ignore-existing local/${AWS_BUCKET:-omnisell} &&
      mc anonymous set download local/${AWS_BUCKET:-omnisell}/public || true
      "
    restart: "no"

  gotenberg:                        # HTML -> PDF
    image: gotenberg/gotenberg:8
    container_name: cmb-gotenberg
    command: ["gotenberg", "--api-timeout=60s"]

volumes:
  pgdata:
  redisdata:
  miniodata:
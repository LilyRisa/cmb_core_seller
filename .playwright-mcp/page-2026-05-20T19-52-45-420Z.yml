          - paragraph [ref=e1614]
          - paragraph [ref=e1615]: Cancellation Process
          - paragraph [ref=e1616]
          - paragraph [ref=e1617]: 1. Generate the cancellation authorization link according to the specifications above;
          - paragraph [ref=e1618]: 2. The seller logs in via the cancellation authorization link;
          - img [ref=e1620]
          - paragraph [ref=e1621]: 3. The seller clicks “Cancel Authorization” to complete the process. After cancellation, the application will no longer have access to the seller’s information.
          - img [ref=e1623]
          - heading "Canceling authorization on Seller Center" [level=3] [ref=e1624]
          - paragraph [ref=e1625]
          - paragraph [ref=e1626]: "Local Sellers:"
          - list [ref=e1627]:
            - listitem [ref=e1628]: The seller logs in to Seller Center and navigates to “Home Page > Platform Partner”;
            - listitem [ref=e1629]: On the Platform Partner page, the seller can view all apps authorized by the shop / main account, along with their authorization expiration time;
            - listitem [ref=e1630]: The seller clicks “Separate” in the action column to revoke authorization for the corresponding application.
          - img [ref=e1632]
          - paragraph [ref=e1633]
          - paragraph [ref=e1634]: CNSC/KRSC Sellers
          - paragraph [ref=e1635]: "“Home Page > Open Platform Management”: Sellers can view which apps have been authorized by the main account. In the authorization management page, sellers can directly revoke the authorization relationship for the merchant or shop."
          - img [ref=e1637]
          - img [ref=e1639]
          - heading "FAQs on authorization and authentication" [level=1] [ref=e1640]
          - paragraph [ref=e1641]
          - paragraph [ref=e1642]:
            - text: If you encounter errors during the authorization process, you can refer to our
            - link "FAQs on authorization and authentication." [ref=e1643] [cursor=pointer]:
              - /url: https://open.shopee.com/faq?top=177&sub=180&page=1&faq=215

          - paragraph [ref=e1091]
          - paragraph [ref=e1092]: Calculating the sign parameter
          - paragraph [ref=e1093]
          - paragraph [ref=e1094]: The sign parameter is not only a component of the authorization link, but also a parameter used for authentication each time it is called. This section will explain how to create a sign base string and calculate the authentication signature through HMAC-SHA256.
          - paragraph [ref=e1095]
          - paragraph [ref=e1096]: Creating a sign base string
          - paragraph [ref=e1097]: There are 3 types of APIs that require the use of different parameters to create the sign base string. (consistent with its common parameters).
          - paragraph [ref=e1098]
          - paragraph [ref=e1099]: "Concatenate the API path (without host) and the common parameters below into a single sign base string in the following order:"
          - paragraph [ref=e1100]
          - list [ref=e1101]:
            - listitem [ref=e1102]: "For Shop APIs: partner_id, api path, timestamp, access_token, shop_id"
            - listitem [ref=e1103]: "For Merchant APIs: partner_id, api path, timestamp, access_token, merchant_id"
            - listitem [ref=e1104]: "For Public APIs: partner_id, api path, timestamp"
          - paragraph [ref=e1105]
          - paragraph [ref=e1106]: Calculating the authentication signature
          - paragraph [ref=e1107]: Use HMAC-SHA256 to hash the sign base string, and use the partner key as the encryption key. The hexadecimal all-lowercase hash value is the authentication signature.
          - paragraph [ref=e1108]
          - paragraph [ref=e1109]: "Python Code Demo:"
          - generic [ref=e1110]:
            - paragraph [ref=e1111]: Python
            - code [ref=e1113]: "import hmac import json import time import requests import hashlib def shop_auth(): timest = int(time.time()) host = \"https://partner.shopeemobile.com\" path = \"/api/v2/shop/auth_partner\" redirect_url = \"https://www.baidu.com/\" partner_id = 80001 tmp = \"test....\" partner_key = tmp.encode() tmp_base_string = \"%s%s%s\" % (partner_id, path, timest) base_string = tmp_base_string.encode() sign = hmac.new(partner_key, base_string, hashlib.sha256).hexdigest() ##generate api url = host + path + \"?partner_id=%s&timestamp=%s&sign=%s&redirect=%s\" % (partner_id, timest, sign, redirect_url) print(url)"

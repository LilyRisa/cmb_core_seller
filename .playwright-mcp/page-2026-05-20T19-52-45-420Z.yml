          - heading "Redirect URL Domain Validation Requirements" [level=3] [ref=e737]
          - paragraph [ref=e738]
          - paragraph [ref=e739]: To ensure seller data security, the platform has introduced domain validation for the callback address (redirect_uri) in authorization links. All developers are required to configure the Test Redirect URL Domain and Live Redirect URL Domain for each App in the Console.
          - paragraph [ref=e740]
          - paragraph [ref=e741]: "The redirect_uri parameter mentioned above refers to the callback URL configured in the App information page. You can view it as follows:"
          - img [ref=e743]
          - paragraph [ref=e744]
          - paragraph [ref=e745]
          - heading "Notes on Redirect URL Domain Validation" [level=3] [ref=e746]
          - paragraph [ref=e747]
          - paragraph [ref=e748]: 1. For Apps that have already been created but have not yet declared a callback URL domain, developers should log in to the Console and complete the configuration in the App edit page as soon as possible. Before the configuration is completed, the platform will not enforce domain validation, and the existing authorization process will not be affected.
          - paragraph [ref=e749]: "2. If the domain of the redirect_uri parameter (or the redirect parameter in legacy links) does not match the Redirect URL Domain configured in the Console when generating an authorization link, the platform will return the following error:"
          - paragraph [ref=e750]:
            - text: "\"The domain of redirect_uri is not consistent with the Redirect URL Domain declared in console\""
            - text: (The domain of the callback URL does not match the Redirect URL Domain declared in the Console.)
          - paragraph [ref=e751]
          - heading "Authorization Link Examples" [level=3] [ref=e752]
          - paragraph [ref=e753]
          - paragraph [ref=e754]: The following are examples of authorization links for both the Production and Sandbox environments for your reference.

          - paragraph [ref=e1402]: "Python Code Demo:"
          - generic [ref=e1403]:
            - paragraph [ref=e1404]: Python
            - code [ref=e1406]: "# refresh token def get_access_token_shop_level(shop_id, partner_id, tmp_partner_key, refresh_token): timest = int(time.time()) host = \"https://openplatform.sandbox.test-stable.shopee.sg\" path = \"/api/v2/auth/access_token/get\" body = {\"shop_id\": shop_id, \"refresh_token\": refresh_token,\"partner_id\":partner_id} tmp_base_string = \"%s%s%s\" % (partner_id, path, timest) base_string = tmp_base_string.encode() partner_key = tmp_partner_key.encode() sign = hmac.new(partner_key, base_string, hashlib.sha256).hexdigest() url = host + path + \"?partner_id=%s&timestamp=%s&sign=%s\" % (partner_id, timest, sign) # print(url) headers = {\"Content-Type\": \"application/json\"} resp = requests.post(url, json=body, headers=headers) ret = json.loads(resp.content) access_token = ret.get(\"access_token\") new_refresh_token = ret.get(\"refresh_token\") return access_token, new_refresh_token def get_access_token_merchant_level(merchant_id, partner_id, tmp_partner_key, refresh_token): timest = int(time.time()) host = \"https://openplatform.sandbox.test-stable.shopee.sg\" path = \"/api/v2/auth/access_token/get\" body = {\"merchant_id\": merchant_id, \"refresh_token\": refresh_token} tmp_base_string = \"%s%s%s\" % (partner_id, path, timest) base_string = tmp_base_string.encode() partner_key = tmp_partner_key.encode() sign = hmac.new(partner_key, base_string, hashlib.sha256).hexdigest() url = host + path + \"?partner_id=%s&timestamp=%s&sign=%s\" % (partner_id, timest, sign) headers = {\"Content-Type\": \"application/json\"} resp = requests.post(url, json=body, headers=headers) ret = json.loads(resp.content) access_token = ret.get(\"access_token\") new_refresh_token = ret.get(\"refresh_token\") return access_token, new_refresh_token partner_id = 2006566 partner_key = \"1a78dde5d6c3342f56ac939cbdd81607654c0e87725e118736ba5e3ae31c579c\" shop_id = 602226924 main_account_id = 31219 merchant_id = 45719 code = \"c01204cada7b4cd0e4688154f5a256ca\" print(shop_auth()) # access_token,refresh_token = get_token_shop_level(code,partner_id,partner_key,602226924) # print(access_token) # print(refresh_token) # print(get_access_token_shop_level(shop_id,partner_id,partner_key,refresh_token)) access_token,refresh_token = get_token_account_level(code,partner_id,partner_key,main_account_id) print(access_token) print(refresh_token) print(get_access_token_merchant_level(merchant_id,partner_id,partner_key,refresh_token))"
          - paragraph [ref=e1407]
          - paragraph [ref=e1408]: "Java Code Demo:"
          - generic [ref=e1409]:
            - paragraph [ref=e1410]: Java
            - code [ref=e1412]: "//shop refresh the access token public static String[] get_access_token_shop_level(String refresh_token,long partner_id,String tmp_partner_key,long shop_id) throws ParseException,IOException{ String[] res = new String[2]; long timest = System.currentTimeMillis() / 1000L; String host = \"https://partner.shopeemobile.com\"; String path = \"/api/v2/auth/access_token/get\"; String tmp_base_string = String.format(\"%s%s%s\", partner_id, path, timest); byte[] partner_key; byte[] base_string; BigInteger sign = null; String result = \"\"; try { base_string = tmp_base_string.getBytes(\"UTF-8\"); partner_key = tmp_partner_key.getBytes(\"UTF-8\"); Mac mac = Mac.getInstance(\"HmacSHA256\"); SecretKeySpec secret_key = new SecretKeySpec(partner_key, \"HmacSHA256\"); mac.init(secret_key); sign = new BigInteger(1,mac.doFinal(base_string)); } catch (Exception e) { e.printStackTrace(); } String tmp_url = host + path + String.format(\"?partner_id=%s&timestamp=%s&sign=%s\", partner_id,timest, String.format(\"%032x\",sign)); URL url = new URL(tmp_url); HttpURLConnection conn = null; PrintWriter out = null; BufferedReader in = null; try { conn = (HttpURLConnection) url.openConnection(); conn.setRequestMethod(\"POST\"); conn.setDoOutput(true); conn.setDoInput(true); conn.setConnectTimeout(30000); conn.setReadTimeout(10000); conn.setRequestProperty(\"Content-Type\", \"application/json\"); conn.setRequestProperty(\"Accept\", \"application/json\"); Map<String,Object> map = new HashMap<>(); map.put(\"refresh_token\",refresh_token); map.put(\"shop_id\",shop_id); map.put(\"partner_id\",partner_id); String json = JSON.toJSONString(map); conn.connect(); out = new PrintWriter(conn.getOutputStream()); out.print(json); out.flush(); in = new BufferedReader(new InputStreamReader(conn.getInputStream())); String line = \"\"; while((line=in.readLine())!=null){ result +=line; } JSONObject jsonObject = JSONObject.parseObject(result); res[0] = (String) jsonObject.get(\"access_token\"); res[1] = (String) jsonObject.get(\"refresh_token\"); } catch(Exception e){ e.printStackTrace(); }finally { try{ if(out != null){ out.close(); } if(in != null){ in.close(); } }catch (IOException ioe){ ioe.printStackTrace(); } } return res; } //merchant refresh the access token public static String[] get_access_token_merchant_level(String refresh_token,long partner_id,String tmp_partner_key,long merchant_id) throws ParseException,IOException{ String[] res = new String[2]; long timest = System.currentTimeMillis() / 1000L; String host = \"https://partner.shopeemobile.com\"; String path = \"/api/v2/auth/access_token/get\"; String tmp_base_string = String.format(\"%s%s%s\", partner_id, path, timest); byte[] partner_key; byte[] base_string; BigInteger sign = null; String result = \"\"; try { base_string = tmp_base_string.getBytes(\"UTF-8\"); partner_key = tmp_partner_key.getBytes(\"UTF-8\"); Mac mac = Mac.getInstance(\"HmacSHA256\"); SecretKeySpec secret_key = new SecretKeySpec(partner_key, \"HmacSHA256\"); mac.init(secret_key); sign = new BigInteger(1,mac.doFinal(base_string)); } catch (Exception e) { e.printStackTrace(); } String tmp_url = host + path + String.format(\"?partner_id=%s&timestamp=%s&sign=%s\", partner_id,timest, String.format(\"%032x\",sign)); URL url = new URL(tmp_url); HttpURLConnection conn = null; PrintWriter out = null; BufferedReader in = null; try { conn = (HttpURLConnection) url.openConnection(); conn.setRequestMethod(\"POST\"); conn.setDoOutput(true); conn.setDoInput(true); conn.setConnectTimeout(30000); conn.setReadTimeout(10000); conn.setRequestProperty(\"Content-Type\", \"application/json\"); conn.setRequestProperty(\"Accept\", \"application/json\"); Map<String,Object> map = new HashMap<>(); map.put(\"refresh_token\",refresh_token); map.put(\"merchant_id\",merchant_id); map.put(\"partner_id\",partner_id); String json = JSON.toJSONString(map); conn.connect(); out = new PrintWriter(conn.getOutputStream()); out.print(json); out.flush(); in = new BufferedReader(new InputStreamReader(conn.getInputStream())); String line = \"\"; while((line=in.readLine())!=null){ result +=line; } JSONObject jsonObject = JSONObject.parseObject(result); res[0] = (String) jsonObject.get(\"access_token\"); res[1] = (String) jsonObject.get(\"refresh_token\"); } catch(Exception e){ e.printStackTrace(); }finally { try{ if(out != null){ out.close(); } if(in != null){ in.close(); } }catch (IOException ioe){ ioe.printStackTrace(); } } return res; } }"

          - heading "Acquiring authorizations from shop(s)" [level=2] [ref=e769]
          - paragraph [ref=e770]
          - paragraph [ref=e771]: After you share the authorization link with the seller, the seller needs to log in to their account, fill in the verification code sent to their mobile phone, and enter the authorization page.
          - paragraph [ref=e772]
          - paragraph [ref=e773]: "Account types:"
          - list [ref=e774]:
            - listitem [ref=e775]: "Shop account: can authorize a single shop;"
            - listitem [ref=e776]: "Main account: can authorize multiple merchants / shops;"
            - listitem [ref=e777]: "Sub-account: cannot log in to the authorization page."
          - heading "Authorizing from a shop account" [level=3] [ref=e778]
          - paragraph [ref=e779]
          - paragraph [ref=e780]: 1. The seller fills in their login details and selects Log In.
          - img [ref=e782]
          - paragraph [ref=e783]
          - paragraph [ref=e784]: 2. The seller fills in the verification code sent to their mobile phone and selects Verify.
          - img [ref=e786]
          - paragraph [ref=e787]
          - paragraph [ref=e788]: 3. Upon logging in, the seller selects Confirm Authorization.
          - img [ref=e790]
          - paragraph [ref=e791]
          - paragraph [ref=e792]: 4. The system will display an authorization validity period selector. Sellers can choose from preset durations (7 days, 30 days, 90 days, 180 days, or 365 days), or select “Customize Expiration Time” to set any expiration date within 365 days.
          - paragraph [ref=e793]
          - paragraph [ref=e794]: "5. After authorization is completed, the frontend page will redirect to the redirect_uri specified in the authorization link, along with the authorization code (code) and shop ID (shop_id):"
          - paragraph [ref=e795]:
            - link "https://open.shopee.com/?code=xxxxxxxxxx&shop_id=xxxxxx" [ref=e796] [cursor=pointer]:
              - /url: https://open.shopee.com/?code=xxxxxxxxxx&shop_id=xxxxxx
          - heading "Authorizing from a main account" [level=3] [ref=e797]
          - paragraph [ref=e798]
          - paragraph [ref=e799]: 1. To log in to a main account, the seller selects Switch to Sub Account on the login page.
          - img [ref=e801]
          - paragraph [ref=e802]
          - paragraph [ref=e803]: 2. The seller can then fill in their login details and select Log In.
          - img [ref=e805]
          - paragraph [ref=e806]
          - paragraph [ref=e807]: 3. The seller selects the shops that need to be authorized.
          - paragraph [ref=e808]: "Note: For cross border sellers, If you need to call the merchant’s API, please remind the seller to select the Auth Merchant checkbox."
          - img [ref=e810]
          - paragraph [ref=e811]: "Local main account authorization:"
          - img [ref=e813]
          - paragraph [ref=e814]: 4. If the authorization checkbox is not selected, the system will display a reminder popup.
          - img [ref=e816]
          - paragraph [ref=e817]: 5. The seller selects Confirm Authorization to confirm their selection.
          - img [ref=e819]
          - paragraph [ref=e820]: "6. After authorization is completed, the frontend page will redirect to the redirect_uri specified in the authorization link, along with the authorization code (code) and main account ID (main_account_id):"
          - paragraph [ref=e821]:
            - link "https://open.shopee.com/?code=xxxxxx&main_account_id=xxxxxx" [ref=e822] [cursor=pointer]:
              - /url: https://open.shopee.com/?code=xxxxxx&main_account_id=xxxxxx
          - heading "Getting and using the authorization code" [level=2] [ref=e823]

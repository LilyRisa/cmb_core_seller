              - text: "{ long timest = System.currentTimeMillis() / 1000L; String host = \"https://partner.shopeemobile.com\"; String path = \"/api/v2/shop/auth_partner\"; String redirect_url = \"https://www.baidu.com/\"; long partner_id = 123456L; String tmp_partner_key = \"...\"; String tmp_base_string = String.format(\"%s%s%s\", partner_id, path, timest); byte[] partner_key; byte[] base_string; String sign = \"\"; try { base_string = tmp_base_string.getBytes(\"UTF-8\"); partner_key = tmp_partner_key.getBytes(\"UTF-8\"); Mac mac = Mac.getInstance(\"HmacSHA256\"); SecretKeySpec secret_key = new SecretKeySpec(partner_key, \"HmacSHA256\"); mac.init(secret_key); sign = String.format(\"%064x\",new BigInteger(1,mac.doFinal(base_string))); } catch (Exception e) { e.printStackTrace(); } String url = host + path + String.format(\"?partner_id=%s&timestamp=%s&sign=%s&redirect=%s\", partner_id,timest, sign, redirect_url); System.out.println(url); } //shop request for access token for the first time public static String[] get_token_shop_level(String code,long partner_id,String tmp_partner_key,long shop_id) throws ParseException,IOException{ String[] res = new String[2]; long timest = System.currentTimeMillis() / 1000L; String host = \"https://partner.shopeemobile.com\"; String path = \"/api/v2/auth/token/get\"; String tmp_base_string = String.format(\"%s%s%s\", partner_id, path, timest); byte[] partner_key; byte[] base_string; BigInteger sign = null; String result = \"\"; try { base_string = tmp_base_string.getBytes(\"UTF-8\"); partner_key = tmp_partner_key.getBytes(\"UTF-8\"); Mac mac = Mac.getInstance(\"HmacSHA256\"); SecretKeySpec secret_key = new SecretKeySpec(partner_key, \"HmacSHA256\"); mac.init(secret_key); sign = new BigInteger(1,mac.doFinal(base_string)); } catch (Exception e) { e.printStackTrace(); } String tmp_url = host + path + String.format(\"?partner_id=%s&timestamp=%s&sign=%s\", partner_id,timest, String.format(\"%032x\",sign)); URL url = new URL(tmp_url); HttpURLConnection conn = null; PrintWriter out = null; BufferedReader in = null; try { conn = (HttpURLConnection) url.openConnection(); conn.setRequestMethod(\"POST\"); conn.setDoOutput(true); conn.setDoInput(true); conn.setConnectTimeout(30000); conn.setReadTimeout(10000); conn.setRequestProperty(\"Content-Type\", \"application/json\"); conn.setRequestProperty(\"Accept\", \"application/json\"); Map<String,Object> map = new HashMap<>(); map.put(\"code\",code); map.put(\"shop_id\",shop_id); map.put(\"partner_id\",partner_id); String json = JSON.toJSONString(map); conn.connect(); out = new PrintWriter(conn.getOutputStream()); out.print(json); out.flush(); in = new BufferedReader(new InputStreamReader(conn.getInputStream())); String line = \"\"; while((line=in.readLine())!=null){ result +=line; } JSONObject jsonObject = JSONObject.parseObject(result); res[0] = (String) jsonObject.get(\"access_token\"); res[1] = (String) jsonObject.get(\"refresh_token\"); } catch(Exception e){ e.printStackTrace(); }finally { try{ if(out != null){ out.close(); } if(in != null){ in.close(); } }catch (IOException ioe){ ioe.printStackTrace(); } } return res; } //main account request for the access token for the first time public static String[] get_token_account_level(String code,long partner_id,String tmp_partner_key,long main_account_id) throws ParseException,IOException{ String[] res = new String[2]; long timest = System.currentTimeMillis() / 1000L; String host = \"https://openplatform.sandbox.test-stable.shopee.sg\"; String path = \"/api/v2/auth/token/get\"; String tmp_base_string = String.format(\"%s%s%s\", partner_id, path, timest); byte[] partner_key; byte[] base_string; BigInteger sign = null; String result = \"\"; try { base_string = tmp_base_string.getBytes(\"UTF-8\"); partner_key = tmp_partner_key.getBytes(\"UTF-8\"); Mac mac = Mac.getInstance(\"HmacSHA256\"); SecretKeySpec secret_key = new SecretKeySpec(partner_key, \"HmacSHA256\"); mac.init(secret_key); sign = new BigInteger(1,mac.doFinal(base_string)); } catch (Exception e) { e.printStackTrace(); } String tmp_url = host + path + String.format(\"?partner_id=%s&timestamp=%s&sign=%s\", partner_id,timest, String.format(\"%032x\",sign)); URL url = new URL(tmp_url); HttpURLConnection conn = null; PrintWriter out = null; BufferedReader in = null; try { conn = (HttpURLConnection) url.openConnection(); conn.setRequestMethod(\"POST\"); conn.setDoOutput(true); conn.setDoInput(true); conn.setConnectTimeout(30000); conn.setReadTimeout(10000); conn.setRequestProperty(\"Content-Type\", \"application/json\"); conn.setRequestProperty(\"Accept\", \"application/json\"); Map<String,Object> map = new HashMap<>(); map.put(\"code\",code); map.put(\"main_account_id\",main_account_id); map.put(\"partner_id\",partner_id); String json = JSON.toJSONString(map); conn.connect(); out = new PrintWriter(conn.getOutputStream()); out.print(json); out.flush(); in = new BufferedReader(new InputStreamReader(conn.getInputStream())); String line = \"\"; while((line=in.readLine())!=null){ result +=line; } JSONObject jsonObject = JSONObject.parseObject(result); res[0] = (String) jsonObject.get(\"access_token\"); res[1] = (String) jsonObject.get(\"refresh_token\"); } catch(Exception e){ e.printStackTrace(); }finally { try{ if(out != null){ out.close(); } if(in != null){ in.close(); } }catch (IOException ioe){ ioe.printStackTrace(); } } return res; }"

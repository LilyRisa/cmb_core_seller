          - table [ref=e763]:
            - rowgroup [ref=e764]:
              - row "⚠️ Note The timestamp used to calculate the sign is only valid for 5 minutes. After the timestamp and the sign expire, the authorization link will no longer be valid, and you need to generate a new link." [ref=e765]:

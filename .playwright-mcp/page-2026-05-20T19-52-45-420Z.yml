          - heading "Getting and refreshing the access_token" [level=2] [ref=e867]
          - paragraph [ref=e868]
          - paragraph [ref=e869]: The access_token is a dynamic token required for calling non-public APIs. It is valid for 4 hours and can be used multiple times within its validity period.
          - paragraph [ref=e870]
          - paragraph [ref=e871]: Before the access_token expires, you need to use the refresh_token to call the Refresh Access Token API (RefreshAccessToken) to obtain a new access_token. The refresh_token is valid for 30 days.
          - paragraph [ref=e872]
          - paragraph [ref=e873]: ⚠️ Note
          - list [ref=e874]:
            - listitem [ref=e875]: The access_token and refresh_token corresponding to each shop_id / merchant_id / user_id / supplier_id must be stored separately;
            - listitem [ref=e876]: After a new access_token is generated, the previous access_token will remain valid for another 5 minutes;
            - listitem [ref=e877]: Re-authorization will refresh both the refresh_token and access_token;
            - listitem [ref=e878]: The RefreshAccessToken API must be called within the authorization validity period;
            - listitem [ref=e879]:

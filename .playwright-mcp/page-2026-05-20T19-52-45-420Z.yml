            - code [ref=e1143]: "print(shop_auth()) # first time request token def get_token_shop_level(code, partner_id, tmp_partner_key, shop_id): timest = int(time.time()) host = \"https://partner.shopeemobile.com\" path = \"/api/v2/auth/token/get\" body = {\"code\": code, \"shop_id\": shop_id, \"partner_id\": partner_id} tmp_base_string = \"%s%s%s\" % (partner_id, path, timest) base_string = tmp_base_string.encode() partner_key = tmp_partner_key.encode() sign = hmac.new(partner_key, base_string, hashlib.sha256).hexdigest() url = host + path + \"?partner_id=%s&timestamp=%s&sign=%s\" % (partner_id, timest, sign) # print(url) headers = {\"Content-Type\": \"application/json\"} resp = requests.post(url, json=body, headers=headers) ret = json.loads(resp.content) access_token = ret.get(\"access_token\") new_refresh_token = ret.get(\"refresh_token\") return access_token, new_refresh_token def get_token_account_level(code, partner_id, tmp_partner_key, main_account_id): timest = int(time.time()) host = \"https://openplatform.sandbox.test-stable.shopee.sg\" path = \"/api/v2/auth/token/get\" body = {\"code\": code, \"main_account_id\": main_account_id, \"partner_id\": partner_id} tmp_base_string = \"%s%s%s\" % (partner_id, path, timest) base_string = tmp_base_string.encode() partner_key = tmp_partner_key.encode() sign = hmac.new(partner_key, base_string, hashlib.sha256).hexdigest() url = host + path + \"?partner_id=%s&timestamp=%s&sign=%s\" % (partner_id, timest, sign) headers = {\"Content-Type\": \"application/json\"} resp = requests.post(url, json=body, headers=headers) ret = json.loads(resp.content) access_token = ret.get(\"access_token\") new_refresh_token = ret.get(\"refresh_token\") return access_token, new_refresh_token"

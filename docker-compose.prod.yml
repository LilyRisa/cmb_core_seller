# Production overrides — domain: https://app.cmbcore.com. Chạy kèm base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Bắt buộc trước:
#   - docker network create proxy            (NPM/Caddy đứng ngoài share network này; map app.cmbcore.com → cmb-web:80 + cấp TLS)
#   - cp .env.example .env && chmod 600 .env  (file ./.env cạnh compose, KHÔNG commit — đã có sẵn APP_URL=https://app.cmbcore.com,
#     SANCTUM_STATEFUL_DOMAINS/SESSION_DOMAIN=app.cmbcore.com; điền APP_KEY (key MỚI cho prod), DB_PASSWORD, AWS_*, MAIL_*, SENTRY_LARAVEL_DSN, TIKTOK_* prod)
#   - migrate là bước deploy có kiểm soát: docker compose -f docker-compose.yml -f docker-compose.prod.yml exec app php artisan migrate --force
#
# Lưu ý: docker compose tự đọc ./.env cạnh file compose để (a) thay ${VAR}, (b) qua `env_file:` đẩy vào container.
# Các biến hạ tầng (DB_HOST=postgres, REDIS_HOST=redis, AWS_ENDPOINT=http://minio:9000, ...) ở base `environment:`
# có precedence cao hơn env_file nên ghi đè giá trị tương ứng trong ./.env — đúng ý.

x-prod-logging: &prod-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# App config cho prod: phần lớn lấy từ ./.env (env_file); chỉ ép vài thứ chắc-chắn-phải-vậy.
x-prod-app-env: &prod-app-env
  APP_ENV: production
  APP_DEBUG: "false"
  TRUSTED_PROXIES: "*"            # đứng sau NPM — bootstrap/app.php đọc biến này

services:
  app:
    image: cmbcoreseller-app:${APP_TAG:-latest}
    env_file: ./app/.env
    environment:
      <<: *prod-app-env
      RUN_MIGRATIONS: "false"     # migrate thủ công trong bước deploy
    restart: unless-stopped
    logging: *prod-logging

  web:
    build:
      context: ./app
      dockerfile: docker/nginx/Dockerfile
      args:
        # nginx image = nginx + the public/ (incl. built assets) copied from the app image,
        # so the manifest php-fpm reads and the static files nginx serves never drift apart.
        # `web` depends_on `app`, so compose builds the app image first.
        APP_IMAGE: cmbcoreseller-app:${APP_TAG:-latest}
    image: cmbcoreseller-web:${APP_TAG:-latest}
    networks:
      - default
      - proxy                     # để NPM (cmb-web:80) tới được
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging: *prod-logging

  worker:
    image: cmbcoreseller-app:${APP_TAG:-latest}
    env_file: ./.env
    environment: *prod-app-env
    restart: unless-stopped
    logging: *prod-logging

  scheduler:
    image: cmbcoreseller-app:${APP_TAG:-latest}
    env_file: ./.env
    environment: *prod-app-env
    deploy:
      replicas: 1                 # cron đúng 1 instance (kết hợp onOneServer()/withoutOverlapping() trong routes/console.php)
    restart: unless-stopped
    logging: *prod-logging

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    logging: *prod-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *prod-logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    logging: *prod-logging

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    logging: *prod-logging

networks:
  proxy:
    external: true                # docker network create proxy

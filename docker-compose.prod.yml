# =============================================================================
# PRODUCTION stack — SELF-CONTAINED, single file. Domain: https://app.cmbcore.com
# =============================================================================
# Deploy:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app php artisan migrate --force   # controlled step
#   curl https://app.cmbcore.com/api/v1/health
#
# Portainer (Git stack): set "Compose path" = docker-compose.prod.yml, fill the env
# vars below in Portainer's "Environment variables" section (APP_KEY, DB_PASSWORD,
# AWS_*, MAIL_*, SENTRY_LARAVEL_DSN, TIKTOK_*). Do NOT point Portainer at
# docker-compose.yml — that one is the dev base (auto-merges docker-compose.override.yml,
# which bind-mounts ./app, publishes ports, starts vite/mailpit — wrong for prod).
#
# Prereqs:
#   - docker network create proxy   (external reverse proxy — NPM/Caddy — on this network,
#     mapping host app.cmbcore.com -> http://cmb-web:80 and terminating TLS)
#   - env vars set: see .env.example at the repo root (for CLI: `cp .env.example .env`;
#     compose auto-reads ./.env for ${VAR} substitution. For Portainer: enter them in the UI).
#
# RUN_MIGRATIONS=false here -> the app container does NOT auto-migrate on boot (avoids races
# with multiple replicas); migrations are the controlled `migrate --force` step above.

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-app-build: &app-build
  context: ./app
  dockerfile: docker/Dockerfile
  args:
    # Realtime (Reverb) — PHẢI giống build-args của service `web` để bundle do app image build
    # (manifest @vite) khớp content-hash với static assets của web image (lệch ⇒ 404 asset), và để
    # FE có VITE_REVERB_APP_KEY → bật realtime (thiếu ⇒ lib/echo.ts polling fallback). ADR-0021.
    VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-iojmwem7osjrbryn67y4}
    VITE_REVERB_HOST: ${VITE_REVERB_HOST:-app.cmbcore.com}
    VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
    VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}

# Container env for app / worker / scheduler. In-cluster hostnames are fixed; everything
# else comes from ${VAR} (set in ./.env for CLI, or in Portainer's env-vars UI).
x-app-env: &app-env
  APP_NAME: ${APP_NAME:-CMBcoreSeller}
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: ${APP_KEY}                         # required — `... run --rm app php artisan key:generate --show`
  APP_URL: ${APP_URL:-https://app.cmbcore.com}
  APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
  APP_LOCALE: vi
  TRUSTED_PROXIES: "*"                        # behind NPM — bootstrap/app.php reads this
  LOG_CHANNEL: stack
  LOG_STACK: json
  LOG_LEVEL: ${LOG_LEVEL:-info}
  # Sanctum SPA + session cookie (SPA & API share the host app.cmbcore.com)
  SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-app.cmbcore.com}
  SESSION_DRIVER: redis
  SESSION_DOMAIN: ${SESSION_DOMAIN:-app.cmbcore.com}
  SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-true}"
  SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  # Database (postgres service)
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: ${DB_DATABASE:-cmbcoreseller}
  DB_USERNAME: ${DB_USERNAME:-cmbcoreseller}
  DB_PASSWORD: ${DB_PASSWORD:-1995oklangtu}                 # required
  # Cache / queue (redis service)
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "null"
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  # --- Realtime inbox (Laravel Reverb / WebSocket) — ADR-0021 -----------------
  # App/worker BẮN event tới reverb container qua Pusher HTTP API NỘI BỘ
  # (http://reverb:8080) — KHÔNG đi qua proxy. Browser kết nối wss QUA proxy
  # (xem service `reverb` + build-args VITE_REVERB_* của web). Đổi BROADCAST_CONNECTION
  # về "log" nếu tạm tắt realtime (FE tự fallback polling).
  BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
  REVERB_APP_ID: ${REVERB_APP_ID:-533057}
  REVERB_APP_KEY: ${REVERB_APP_KEY:-iojmwem7osjrbryn67y4}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET:-wztxonql2rcfyrdjkk2g}
  REVERB_HOST: reverb            # app→reverb nội bộ (service name)
  REVERB_PORT: "8080"
  REVERB_SCHEME: http
  REVERB_SERVER_HOST: 0.0.0.0    # reverb bind mọi interface trong container
  REVERB_SERVER_PORT: "8080"
  # Object storage (minio service)
  FILESYSTEM_DISK: s3
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}     # required (also the MinIO root user)
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-1}
  AWS_BUCKET: ${AWS_BUCKET:-omnisell}
  AWS_ENDPOINT: http://minio:9000
  AWS_USE_PATH_STYLE_ENDPOINT: "true"
  # User-uploaded media (SKU/product images) — Cloudflare R2. See docs/07-infra/cloudflare-r2-uploads.md.
  # These MUST be listed here: Portainer's "Environment variables" only feed ${VAR} substitution in this
  # file — they are NOT auto-injected into the container, so a var that isn't referenced below never reaches
  # the app (this is why "env set in Portainer but app doesn't see it" happens). Add them in Portainer too.
  MEDIA_DISK: ${MEDIA_DISK:-r2}
  MEDIA_IMAGE_MAX_KB: ${MEDIA_IMAGE_MAX_KB:-5120}
  R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
  R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
  R2_BUCKET: ${R2_BUCKET}
  R2_ENDPOINT: ${R2_ENDPOINT}
  R2_URL: ${R2_URL}
  R2_DEFAULT_REGION: ${R2_DEFAULT_REGION:-auto}
  R2_USE_PATH_STYLE_ENDPOINT: "${R2_USE_PATH_STYLE_ENDPOINT:-true}"
  # PDF rendering (gotenberg service) + khổ phiếu in mặc định (tenant đè được trong UI: Cài đặt → Mẫu in)
  GOTENBERG_URL: http://gotenberg:3000
  PRINT_LABEL_SIZE: ${PRINT_LABEL_SIZE:-A6}
  FULFILLMENT_DEDUCT_ON: ${FULFILLMENT_DEDUCT_ON:-shipped}
  # Mail
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-support.cmbcore.com}
  MAIL_PORT: ${MAIL_PORT:-465}
  MAIL_USERNAME: ${MAIL_USERNAME:-Laravel 11}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-1995OKlangtu@}
  # Symfony Mailer (Laravel 11) — scheme phải là `smtp` (port 587 + STARTTLS, mặc
  # định Brevo/Mailgun/SendGrid) hoặc `smtps` (port 465 + TLS full). KHÔNG phải `tls`.
  MAIL_SCHEME: ${MAIL_SCHEME:-smtp}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-seller@support.cmbcore.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-CMB Core Seller Support}
  # Error monitoring
  SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN}
  # Marketplace integrations
  INTEGRATIONS_CHANNELS: ${INTEGRATIONS_CHANNELS:-manual,tiktok,shopee,lazada}
  INTEGRATIONS_CARRIERS: ${INTEGRATIONS_CARRIERS:-}
  # "Luồng A": "Chuẩn bị hàng" gọi API sàn arrange-shipment + lấy tem thật (endpoint TikTok theo SDK chính
  # thức fulfillment 202309). Bật mặc định; đặt =false nếu shop yêu cầu handover_method khác / lỗi gọi sàn
  # (lỗi vẫn được bắt & gắn cờ has_issue trên đơn, không chặn — vẫn tạo vận đơn cục bộ).
  INTEGRATIONS_TIKTOK_FULFILLMENT: "${INTEGRATIONS_TIKTOK_FULFILLMENT:-true}"
  # Đối soát/Statements TikTok (SPEC 0016). Bật mặc định; tắt = đặt biến này "false" ở Portainer.
  # KHÔNG để default rỗng (`:-`) — env="" ⇒ (bool)"" = false ⇒ tắt nhầm.
  INTEGRATIONS_TIKTOK_FINANCE: "${INTEGRATIONS_TIKTOK_FINANCE:-true}"
  TIKTOK_SHIP_PACKAGE_PATH: ${TIKTOK_SHIP_PACKAGE_PATH:-}
  TIKTOK_PACKAGE_DETAIL_PATH: ${TIKTOK_PACKAGE_DETAIL_PATH:-}
  TIKTOK_SHIPPING_DOCS_PATH: ${TIKTOK_SHIPPING_DOCS_PATH:-}
  TIKTOK_APP_KEY: ${TIKTOK_APP_KEY}
  TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET}
  TIKTOK_SERVICE_ID: ${TIKTOK_SERVICE_ID}
  TIKTOK_SANDBOX: "${TIKTOK_SANDBOX:-false}"
  # lazada
  LAZADA_APP_KEY: ${LAZADA_APP_KEY}
  LAZADA_APP_SECRET: ${LAZADA_APP_SECRET}
  LAZADA_SANDBOX: "${LAZADA_SANDBOX:-false}"
  # Đối soát Lazada (SPEC 0016). Bật mặc định; app Lazada vẫn cần quyền nhóm Finance trên Open Platform.
  # KHÔNG để default rỗng (`:-`) — env="" ⇒ (bool)"" = false ⇒ tắt nhầm.
  INTEGRATIONS_LAZADA_FINANCE: "${INTEGRATIONS_LAZADA_FINANCE:-true}"
  # Lazada IM Chat — app "IM ERP" RIÊNG (tách khỏi app orders; Lazada gate quyền IM theo app).
  # Nhập 2 biến này ở Portainer để bật; để trống = chưa bật IM chat. `redirect_uri` trống ⇒ connector
  # tự suy <APP_URL>/oauth/lazada_im/callback. Host API/auth/authorize KHÔNG khai ở đây để dùng default
  # đúng (VN) — nếu cần đổi region, thêm LAZADA_IM_API_BASE_URL/AUTH_BASE_URL/AUTHORIZE_URL (giá trị
  # KHÔNG để trống). Xem docs/04-channels/lazada-chat-setup.md.
  LAZADA_IM_APP_KEY: ${LAZADA_IM_APP_KEY:-}
  LAZADA_IM_APP_SECRET: ${LAZADA_IM_APP_SECRET:-}
  LAZADA_IM_REDIRECT_URI: ${LAZADA_IM_REDIRECT_URI:-}
  # shopee — connector faithful theo Shopee Open Platform v2 (docs/04-channels/shopee.md). Build sẵn nhưng
  # CHƯA bật mặc định: thêm `shopee` vào INTEGRATIONS_CHANNELS SAU khi verify sandbox. PARTNER_KEY là BÍ MẬT
  # (ký HMAC request + verify webhook) — KHÔNG để default; nhập ở Portainer/.env. Super-admin cũng đặt được ở
  # /admin/system-settings (marketplace.shopee.partner_id/partner_key/sandbox) — DB đè config.
  SHOPEE_PARTNER_ID: ${SHOPEE_PARTNER_ID:-}
  SHOPEE_PARTNER_KEY: ${SHOPEE_PARTNER_KEY:-}
  # Push Partner Key RIÊNG (Shopee console → Push Mechanism) để verify chữ ký webhook push. Để trống ⇒
  # fallback dùng PARTNER_KEY. Bí mật — nhập ở Portainer/.env, hoặc /admin/system-settings (marketplace.shopee.push_partner_key).
  SHOPEE_PUSH_PARTNER_KEY: ${SHOPEE_PUSH_PARTNER_KEY:-}
  SHOPEE_SANDBOX: "${SHOPEE_SANDBOX:-true}"
  # Host API (CHÍNH THỨC theo open.shopee.com): SANDBOX VN/Global = https://openplatform.sandbox.test-stable.shopee.sg ;
  # PRODUCTION = https://partner.shopeemobile.com. (Đang để mặc định SANDBOX để test — đổi sang prod khi go-live.)
  SHOPEE_API_BASE_URL: ${SHOPEE_API_BASE_URL:-https://openplatform.sandbox.test-stable.shopee.sg}
  INTEGRATIONS_SHOPEE_FULFILLMENT: "${INTEGRATIONS_SHOPEE_FULFILLMENT:-true}"
  # Đối soát Shopee (SPEC 0016). Bật mặc định; cần scope tài chính khi cấp token. Đặt "false" ở Portainer để tắt.
  INTEGRATIONS_SHOPEE_FINANCE: "${INTEGRATIONS_SHOPEE_FINANCE:-true}"
  SHOPEE_SHIP_METHOD: ${SHOPEE_SHIP_METHOD:-auto}
  # URL callback dùng để VERIFY chữ ký webhook push (base-string = "URL|body" theo Shopee Open Platform,
  # doc 18-push-mechanism-notifications). PHẢI khớp Y HỆT URL đã nhập ở Shopee Console → Push Mechanism.
  # Không set ⇒ verifier fallback url('/webhook/shopee') (phụ thuộc proxy scheme → dễ ra http → sai chữ ký).
  SHOPEE_PUSH_URL: ${SHOPEE_PUSH_URL:-https://app.cmbcore.com/webhook/shopee}
  # 'strict' (mặc định) = từ chối push sai chữ ký (401). 'lenient' = CHẤP NHẬN dù sai chữ ký (chỉ log
  # cảnh báo). ⚠️ Chỉ dùng lenient tạm thời để gỡ kẹt verify — webhook nhận tin chat trực tiếp vào inbox,
  # lenient ⇒ ai biết URL cũng chèn được tin/sự kiện giả. Tắt lại 'strict' ngay khi tìm ra key đúng.
  SHOPEE_WEBHOOK_VERIFY_MODE: ${SHOPEE_WEBHOOK_VERIFY_MODE:-strict}
  # --- Hộp thư hợp nhất / Messaging (SPEC-0024) -------------------------------
  # Bật connector nào (CSV). 'manual' luôn có (test). Default đã bật chat 3 sàn
  # (tiktok_chat/lazada_chat/shopee_chat) — dùng chung credentials+OAuth với orders
  # (ADR-0019), chỉ hoạt động khi gian hàng tương ứng đã kết nối + bật "nhắn tin".
  # KHÔNG bật facebook_page mặc định (cần App Review + MESSAGING_FACEBOOK_* riêng) —
  # thêm vào INTEGRATIONS_MESSAGING ở Portainer khi sẵn sàng. Connector chat ở mức
  # shape-tested → verify sandbox từng sàn trước khi tin dùng rộng.
  INTEGRATIONS_MESSAGING: ${INTEGRATIONS_MESSAGING:-tiktok_chat,lazada_chat,shopee_chat}
  # Facebook Page Messenger — xem docs/04-channels/facebook-messenger-setup.md.
  # APP_ID/APP_SECRET lấy từ Meta App → Settings → Basic. VERIFY_TOKEN tự đặt 1 chuỗi
  # bí mật rồi nhập GIỐNG vào Meta → Messenger → Webhooks. (Bắt buộc khi bật facebook_page.)
  # ⚠️ APP_SECRET & VERIFY_TOKEN là BÍ MẬT — KHÔNG để default ở đây (tránh commit lộ).
  # Nhập ở Portainer "Environment variables" hoặc ./.env. App ID là public nên để default được.
  MESSAGING_FACEBOOK_APP_ID: ${MESSAGING_FACEBOOK_APP_ID:-3063164863879766}
  MESSAGING_FACEBOOK_APP_SECRET: ${MESSAGING_FACEBOOK_APP_SECRET:-}
  MESSAGING_FACEBOOK_VERIFY_TOKEN: ${MESSAGING_FACEBOOK_VERIFY_TOKEN:-}
  MESSAGING_FACEBOOK_GRAPH_VERSION: ${MESSAGING_FACEBOOK_GRAPH_VERSION:-v19.0}
  # Redirect URI OAuth — mặc định = APP_URL + /oauth/facebook_page/callback. Chỉ đặt khi
  # domain callback khác APP_URL. PHẢI đăng ký Y HỆT trong Meta → Facebook Login → Valid OAuth Redirect URIs.
  MESSAGING_FACEBOOK_REDIRECT_URI: ${MESSAGING_FACEBOOK_REDIRECT_URI:-}
  # Facebook Ads (Marketing API) — DÙNG LẠI app Facebook hiện có (cùng app Page/Messenger).
  # Credential tự fallback sang MESSAGING_FACEBOOK_APP_ID/SECRET (config/integrations.php) nên
  # KHÔNG khai FACEBOOK_ADS_* ở đây (thừa). Redirect tự suy <APP_URL>/oauth/facebook_ads/callback.
  # ⚠️ App cũ PHẢI bật product "Marketing API" + scope ads_read,business_management trên Meta,
  # và thêm redirect /oauth/facebook_ads/callback vào Facebook Login → Valid OAuth Redirect URIs.
  INTEGRATIONS_ADS: ${INTEGRATIONS_ADS:-facebook,tiktok}
  # TikTok Marketing API (Ads) — ADR-0025, read-only. App RIÊNG, KHÁC TIKTOK_APP_KEY (TikTok Shop):
  # KHÔNG fallback. Đặt App ID/Secret ở Portainer (TikTok API for Business → My Apps → Basic Information).
  # Redirect tự suy <APP_URL>/oauth/tiktok_marketing/redirect (đã đăng ký trên TikTok portal) — chỉ
  # đặt TIKTOK_ADS_REDIRECT_URI khi domain callback khác APP_URL. Chưa đặt creds ⇒ nút kết nối báo 422.
  TIKTOK_ADS_APP_ID: ${TIKTOK_ADS_APP_ID:-}
  TIKTOK_ADS_APP_SECRET: ${TIKTOK_ADS_APP_SECRET:-}
  TIKTOK_ADS_REDIRECT_URI: ${TIKTOK_ADS_REDIRECT_URI:-}
  # Media tin nhắn: dùng r2 (public-CDN, browser fetch được qua signed URL). TTL signed URL (giây).
  MESSAGING_MEDIA_DISK: ${MESSAGING_MEDIA_DISK:-r2}
  MESSAGING_SIGNED_URL_TTL: ${MESSAGING_SIGNED_URL_TTL:-300}
  MESSAGING_MAX_IMAGE_MB: ${MESSAGING_MAX_IMAGE_MB:-25}
  MESSAGING_MAX_VIDEO_MB: ${MESSAGING_MAX_VIDEO_MB:-100}
  MESSAGING_MAX_FILE_MB: ${MESSAGING_MAX_FILE_MB:-25}
  # --- Trợ lý trợ giúp sản phẩm (SPEC-0028) — RAG hỏi-đáp cách dùng + Hỏi CSKH ---
  # Trợ lý "Hỏi AI" (module Support) — credentials RIÊNG, TỰ CHỨA (không dùng ai_providers).
  # CHAT và EMBEDDING tách độc lập: dùng cùng provider hay khác provider tuỳ ý (chỉ cần đúng
  # base_url + api_key + tên MODEL embedding). Có thể cấu hình ở /admin/ai-support thay env (DB ghi đè env).
  # ⚠️ *_API_KEY là BÍ MẬT — nhập ở Portainer/.env, KHÔNG để default. Bỏ trống ⇒ keyword.
  # Sau deploy chạy 1 lần: docker compose -f docker-compose.prod.yml exec app php artisan help:index
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  QDRANT_API_KEY: ${QDRANT_API_KEY:-}
  # Chat (sinh câu trả lời) — base_url GỐC host, KHÔNG kèm /v1.
  HELP_ASSISTANT_BASE_URL: ${HELP_ASSISTANT_BASE_URL:-}
  HELP_ASSISTANT_API_KEY: ${HELP_ASSISTANT_API_KEY:-}
  HELP_ASSISTANT_MODEL: ${HELP_ASSISTANT_MODEL:-}
  # Embedding (tạo vector RAG) — bỏ trống base_url ⇒ tắt vector, chạy keyword.
  HELP_ASSISTANT_EMBEDDING_BASE_URL: ${HELP_ASSISTANT_EMBEDDING_BASE_URL:-}
  HELP_ASSISTANT_EMBEDDING_API_KEY: ${HELP_ASSISTANT_EMBEDDING_API_KEY:-}
  HELP_ASSISTANT_EMBEDDING_MODEL: ${HELP_ASSISTANT_EMBEDDING_MODEL:-text-embedding-3-small}
  # Đính kèm hội thoại CSKH (ảnh/video/tệp): dùng r2 (như media tin nhắn) để browser
  # xem trực tiếp ảnh/video qua signed URL. TTL signed URL (giây) + giới hạn dung lượng (MB).
  SUPPORT_MEDIA_DISK: ${SUPPORT_MEDIA_DISK:-r2}
  SUPPORT_SIGNED_URL_TTL: ${SUPPORT_SIGNED_URL_TTL:-300}
  SUPPORT_MAX_FILES: ${SUPPORT_MAX_FILES:-5}
  SUPPORT_MAX_IMAGE_MB: ${SUPPORT_MAX_IMAGE_MB:-25}
  SUPPORT_MAX_VIDEO_MB: ${SUPPORT_MAX_VIDEO_MB:-100}
  SUPPORT_MAX_FILE_MB: ${SUPPORT_MAX_FILE_MB:-25}

services:
  app:                                # php-fpm
    build: *app-build
    image: cmbcoreseller-app:${APP_TAG:-latest}
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9000"
    restart: unless-stopped
    logging: *logging

  web:                                # nginx -> app:9000 (serves SPA + static; behind external proxy)
    build:
      context: ./app
      dockerfile: docker/nginx/Dockerfile
      args:
        # Realtime (Reverb) — nhúng vào bundle FE lúc build (ADR-0021). HOST = domain
        # CÔNG KHAI browser kết nối wss (qua proxy), KHÔNG phải service name nội bộ.
        # Bỏ trống VITE_REVERB_APP_KEY ⇒ FE polling fallback (không bật realtime).
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-iojmwem7osjrbryn67y4}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-app.cmbcore.com}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
    image: cmbcoreseller-web:${APP_TAG:-latest}
    depends_on:
      - app
    networks:
      - default
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging: *logging

  worker:                             # Laravel Horizon (queues)
    build: *app-build
    image: cmbcoreseller-app:${APP_TAG:-latest}
    command: ["php", "artisan", "horizon"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *logging

  reverb:                             # Laravel Reverb WebSocket server (realtime inbox — ADR-0021)
    build: *app-build
    image: cmbcoreseller-app:${APP_TAG:-latest}
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment: *app-env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - proxy                          # NPM/Caddy route wss://<domain>/app → cmb-reverb:8080 (xem docs/07-infra/reverb-realtime-setup.md)
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging: *logging

  scheduler:                          # cron (schedule:work) — single instance (onOneServer()/withoutOverlapping() in routes/console.php)
    build: *app-build
    image: cmbcoreseller-app:${APP_TAG:-latest}
    command: ["php", "artisan", "schedule:work"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cmbcoreseller}
      POSTGRES_USER: ${DB_USERNAME:-cmbcoreseller}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1995oklangtu}  
    ports:
    - "5432:5432"     # required
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cmbcoreseller} -d ${DB_DATABASE:-cmbcoreseller}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *logging

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *logging

  minio:                              # S3-compatible object storage
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *logging

  minio-init:                         # one-shot: ensure the bucket exists, then exit
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_KEY: ${AWS_ACCESS_KEY_ID}
      MC_SECRET: ${AWS_SECRET_ACCESS_KEY}
      MC_BUCKET: ${AWS_BUCKET:-omnisell}
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 \"$$MC_KEY\" \"$$MC_SECRET\" && mc mb --ignore-existing \"local/$$MC_BUCKET\" && mc anonymous set download \"local/$$MC_BUCKET/public\" || true"]
    restart: "no"

  gotenberg:                          # HTML -> PDF (picking/packing/label printing — Phase 3)
    image: gotenberg/gotenberg:8
    command: ["gotenberg", "--api-timeout=60s"]
    restart: unless-stopped
    logging: *logging

  qdrant:                             # Vector DB cho trợ lý trợ giúp (RAG help-bot, SPEC-0028)
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *logging

volumes:
  pgdata:
  redisdata:
  miniodata:
  qdrantdata:

networks:
  proxy:
    external: true                    # docker network create proxy
